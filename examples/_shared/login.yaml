# Reusable login steps — include from other manifests via: action: include, path: _shared/login.yaml
name: "Login"
description: "Authenticate with dev credentials"

steps:
  - action: open
    url: "{base_url}"

  - action: click
    target: "Sign in"

  - action: fill
    target: "Email"
    # Note: credentials.username may be an email address depending on the auth provider
    value: "{credentials.username}"

  - action: fill
    target: "Password"
    value: "{credentials.password}"

  - action: click
    target: "Submit"

  - action: wait
    duration: 3s

  - action: assert_url
    expected: "/dashboard"
